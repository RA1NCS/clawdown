<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Clawdown</title>

        <!-- Google Fonts: JetBrains Mono, Lora, DM Sans -->
        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
        />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap"
            rel="stylesheet"
        />

        <!-- highlight.js theme (github, overridden in style.css) -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
        />

        <link
            rel="stylesheet"
            href="style.css"
        />

        <!-- Umami Analytics Tracking -->
        <script
            defer
            src="https://cloud.umami.is/script.js"
            data-website-id="eb294b42-8594-4071-b131-5a97294626e8"
        ></script>
    </head>
    <body>
        <!-- ── Toolbar ─────────────────────────────────────── -->
        <header id="toolbar">
            <div class="toolbar-left">
                <!-- Clawd sprite injected by app.js -->
                <span
                    id="clawd-toolbar"
                    aria-hidden="true"
                ></span>
                <span class="app-name"
                    ><span class="app-name-accent">Claw</span>down</span
                >
            </div>

            <div class="toolbar-right">
                <button
                    id="clawd-toggle"
                    class="toggle-btn active"
                    aria-pressed="true"
                    aria-label="Toggle Clawd in PDF"
                >
                    <span
                        id="clawd-btn-icon"
                        aria-hidden="true"
                    ></span>
                    <span class="toggle-label">in PDF</span>
                    <span class="toggle-dot"></span>
                </button>
                <button
                    id="download-btn"
                    class="download-btn"
                    aria-label="Download as PDF"
                >
                    Download PDF
                </button>
            </div>
        </header>

        <!-- ── Split panes ────────────────────────────────── -->
        <main>
            <!-- markdown editor (left) -->
            <section
                id="editor-pane"
                aria-label="Markdown editor"
            >
                <textarea
                    id="editor"
                    spellcheck="false"
                    autocorrect="off"
                    autocapitalize="off"
                    placeholder="Write your markdown here..."
                ></textarea>
            </section>

            <!-- divider -->
            <div id="resize-handle"></div>

            <!-- live PDF preview (right) -->
            <section
                id="preview-pane"
                aria-label="PDF preview"
            >
                <!-- html2pdf capture target -->
                <div id="preview-content">
                    <div id="md-output"></div>
                </div>
            </section>
        </main>

        <!-- floating feedback button -->
        <a
            id="feedback-fab"
            href="https://app.youform.com/forms/wvdaxjhc"
            target="_blank"
            rel="noopener"
            aria-label="Feedback"
        >
            <span
                id="fab-clawd"
                aria-hidden="true"
            ></span>

            <span class="fab-label">Feedback?</span>
        </a>

        <!-- CDN scripts (order matters — globals used by app.js) -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
